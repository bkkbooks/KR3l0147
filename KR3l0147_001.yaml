body:
  text: 烏衣鬼軍記烏衣鬼軍記散騎侍郎王祐疾困與母辭訣既而聞有通賓者曰某郡某里某人嘗為別駕祐亦雅聞其姓氏有頃奄然來至曰與卿士類有自然之分又州里情便款然今年國家有大事出三將軍分布徵發吾等十餘人為趙公明府參佐至此倉卒見卿有高門大屋故來投與卿相得大不可言祐知其鬼神曰不幸疾篤死在旦夕遭卿以性命相託答曰人生有死此必然之事死者不繫生時貴賤吾今見領兵三千須卿得度簿相付如此地難得不宜辭之祐曰老母年高兄弟無有一旦死亡前無供養遂欷歔不能自勝其人愴然曰卿位為常伯而家無餘財向聞與尊夫人辭訣言辭哀苦然則卿國士也如何可令死吾當相為因起去明日更來其明日又來祐曰卿許活吾當卒恩否答曰大老子業已許卿當復相欺耶見其從者數百人皆長二尺許烏衣為服赤油為志祐家擊鼓禱祀諸鬼聞鼓聲皆應節起舞振袖颯颯有聲祐將為設酒食辭曰不須因復起去謂祐曰病在人體中如火當以水解之方取一杯水發被灌之又曰為卿留赤筆十餘枝在薦下可與人使簪之出入辟惡災舉事皆無恙因道曰王甲李乙吾皆與之遂執祐手與辭時祐得安眠夜中忽覺乃呼左右令開被神以水灌我將大沾濡開被而信有水在上被之下下被之上不浸如露之在荷量之得三升七合於是疾三分愈二數日大除凡其所道當取者皆死亡唯王文英十年後乃亡所道與赤筆人皆經疾病及兵亂皆亦無恙初有妖書云上帝以三將軍趙公明鍾士季各督數鬼下取人莫知所在祐病差見此書與所道趙公明合焉
